{% extends "base.html" %}
{% block title %}Todo Form{% endblock %}
{% load crispy_forms_tags %}
{% block content %}
    <form method="post">
        <h2 class="mb-4 text-center">Todo Form</h2>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-dark w-100" type="submit">Create Task</button>
    </form>
{% endblock %}
